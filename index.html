<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✊ 剪刀石頭布 — AI 手勢辨識</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    /* 網頁整體外觀風格設計 */
    body {
      margin: 0;
      padding: 0;
      background-color: #1e1e24; /* 深色沉浸式背景 */
      color: #ffffff;
      font-family: 'Helvetica Neue', Arial, Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    
    #container {
      text-align: center;
      background: #2a2a35;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      max-width: 700px;
      width: 90%;
    }
    
    h1 {
      margin-top: 0;
      margin-bottom: 5px;
      font-size: 26px;
      letter-spacing: 1px;
    }

    p {
      color: #a0a0b0;
      margin-bottom: 20px;
      font-size: 14px;
    }
    
    /* 用來包覆 p5.js 畫布的區塊，設定邊框讓視覺更集中 */
    #canvas-holder {
      margin: 0 auto;
      border-radius: 12px;
      overflow: hidden;
      border: 4px solid #4a4a5a;
      background-color: #000000;
      /* 確保在小螢幕上可以自適應縮放 */
      max-width: 640px; 
      aspect-ratio: 4 / 3;
    }
    
    /* 下方即時顯示辨識結果的狀態列 */
    #info-bar {
      font-size: 20px;
      font-weight: bold;
      background: #3b3b4f;
      padding: 12px 28px;
      border-radius: 30px;
      display: inline-block;
      margin-top: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    #result {
      color: #00ffcc; /* 強調結果字的顏色 */
    }
    
    /* 隱藏 HTML 預設產生的原生 video 標籤，因為我們要用 p5.js 重新繪製 */
    video {
      display: none;
    }
  </style>
</head>
<body>

  <div id="container">
    <h1>✊ 石頭   🖐 布   ✌️ 剪刀</h1>
    <p>AI 即時手勢辨識猜拳 — 請在瀏覽器彈出視窗中允許攝影機存取權限</p>
    
    <div id="canvas-holder"></div>
    
    <div id="info-bar">
      偵測結果：<span id="result">載入 AI 模型中...</span>
    </div>
  </div>

  <script src="sketch.js"></script>

</body>
</html>
